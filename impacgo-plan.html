<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMPACGO Plan</title>
<style>
:root{
  --navy-950:#141b2d; --navy-900:#182234; --navy-800:#1f2b42; --navy-700:#28365294;
  --blue-600:#3b6fef; --blue-500:#4f7bf5; --blue-100:#e4ecff; --blue-50:#eef3ff;
  --bg:#f3f5fa; --card:#ffffff; --border:#e6e9f2; --text:#1c2434; --text-soft:#5b6478; --text-faint:#8a91a3;
  --green:#17a673; --green-bg:#e3f8ef; --amber:#e8a325; --amber-bg:#fdf1dc; --red:#e6493f; --red-bg:#fbe6e4;
  --purple:#7c5cfc; --purple-bg:#ede9ff; --teal:#14b8a6; --teal-bg:#dcfaf5; --pink:#ec5a9d; --pink-bg:#fce6f1;
  --cyan:#0ea5c4; --cyan-bg:#dff4f9;
  --radius:12px; --radius-sm:8px;
  --shadow:0 1px 2px rgba(20,27,45,.04), 0 8px 24px -12px rgba(20,27,45,.10);
  color-scheme: light;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:#00000022;border-radius:6px;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;}
svg{display:block;}
.icon{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:none;}

.app{display:flex;min-height:100vh;}
.sidebar{width:254px;flex:none;background:linear-gradient(190deg,var(--navy-900),var(--navy-950));color:#c9cfdd;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;transition:width .15s;}
.sidebar.collapsed{width:70px;}
.sidebar.collapsed .nav-item span, .sidebar.collapsed .nav-group-label, .sidebar.collapsed .sidebar-tenant, .sidebar.collapsed .sidebar-brand b, .sidebar.collapsed .nav-item .count, .sidebar.collapsed .sidebar-user .u-name, .sidebar.collapsed .sidebar-user .u-role, .sidebar.collapsed .logout-item span{display:none;}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:20px 18px 16px;color:#fff;font-weight:700;font-size:15px;letter-spacing:.2px;cursor:pointer;}
.sidebar-brand .brand-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--blue-600),#6a5cf7);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex:none;}
.sidebar-tenant{margin:0 14px 14px;padding:10px 12px;background:#ffffff0d;border:1px solid #ffffff14;border-radius:10px;font-size:12px;color:#9aa3ba;}
.sidebar-tenant b{display:block;color:#e7eaf3;font-size:13px;font-weight:600;margin-bottom:1px;}
.nav-scroll{flex:1;padding:4px 10px 14px;}
.nav-group-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:#6b7690;font-weight:700;margin:16px 12px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;font-size:13.3px;font-weight:500;color:#aab1c6;cursor:pointer;margin-bottom:1px;position:relative;}
.nav-item .icon{width:16px;height:16px;opacity:.85;flex:none;}
.nav-item:hover{background:#ffffff0d;color:#e7eaf3;}
.nav-item.active{background:var(--blue-600);color:#fff;box-shadow:0 4px 14px -4px #3b6fef88;}
.nav-item.active .icon{opacity:1;}
.nav-item .count{margin-left:auto;font-size:11px;background:#ffffff1a;padding:1px 6px;border-radius:20px;color:#dfe3ee;}
.nav-item.active .count{background:#ffffff2e;color:#fff;}
.sidebar-foot{padding:12px 14px 16px;border-top:1px solid #ffffff14;}
.sidebar-user{display:flex;align-items:center;gap:9px;padding:8px;border-radius:10px;cursor:pointer;}
.sidebar-user:hover{background:#ffffff0d;}
.sidebar-user .avatar{width:32px;height:32px;flex:none;}
.sidebar-user .u-name{font-size:12.5px;font-weight:600;color:#e7eaf3;}
.sidebar-user .u-role{font-size:11px;color:#8a91ac;}
.logout-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:#aab1c6;font-size:13px;font-weight:500;cursor:pointer;margin-top:4px;}
.logout-item:hover{background:#ffffff0d;color:#fff;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:10px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.topbar-search{flex:1;max-width:380px;min-width:160px;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text-faint);}
.topbar-search input{border:none;background:none;outline:none;font-size:13px;color:var(--text);width:100%;font-family:inherit;}
.topbar-actions{display:flex;align-items:center;gap:10px;margin-left:auto;}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-soft);position:relative;flex:none;}
.icon-btn:hover{background:var(--bg);}
.icon-btn .dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid var(--card);}
.switcher{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:10px;padding:6px 10px 6px 10px;cursor:pointer;background:var(--card);}
.switcher select{border:none;background:none;font-size:12.3px;font-weight:600;color:var(--text);outline:none;font-family:inherit;max-width:170px;}
.switcher .swlabel{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;}
.topbar-profile{display:flex;align-items:center;gap:9px;padding:5px 10px 5px 5px;border-radius:10px;cursor:pointer;border:1px solid var(--border);flex:none;}
.topbar-profile:hover{background:var(--bg);}
.crumbs{font-size:12px;color:var(--text-faint);margin-bottom:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.crumbs a:hover{color:var(--blue-600);}

.page{padding:20px 26px 60px;max-width:1440px;}
.view{display:none;}
.view.active{display:block;}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
.page-title{font-size:21px;font-weight:700;color:var(--text);letter-spacing:-.2px;margin:0;}
.page-sub{font-size:13px;color:var(--text-soft);margin-top:3px;max-width:840px;}
.page-actions{display:flex;gap:10px;flex:none;flex-wrap:wrap;}

.btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;padding:9px 15px;border-radius:9px;border:1px solid transparent;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn .icon{width:15px;height:15px;}
.btn-primary{background:var(--blue-600);color:#fff;}
.btn-primary:hover{background:#3160d6;}
.btn-secondary{background:var(--card);color:var(--text);border-color:var(--border);}
.btn-secondary:hover{background:var(--bg);}
.btn-ghost{background:transparent;color:var(--text-soft);}
.btn-ghost:hover{background:var(--bg);}
.btn-sm{padding:6px 11px;font-size:12.3px;border-radius:7px;}
.btn-danger{background:var(--red-bg);color:var(--red);}
.btn-danger:hover{background:#f6d3d0;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.card-pad{padding:18px 20px;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.card-head h3{font-size:14.5px;font-weight:700;margin:0;}
.card-head .hint{font-size:12px;color:var(--text-faint);}
.grid{display:grid;gap:16px;}
.g-2{grid-template-columns:repeat(2,1fr);}
.g-3{grid-template-columns:repeat(3,1fr);}
.g-4{grid-template-columns:repeat(4,1fr);}
.g-5{grid-template-columns:repeat(5,1fr);}
.g-6{grid-template-columns:repeat(6,1fr);}
.g-7{grid-template-columns:repeat(7,1fr);}
@media (max-width:1200px){.g-6{grid-template-columns:repeat(3,1fr);}.g-5{grid-template-columns:repeat(3,1fr);}.g-4{grid-template-columns:repeat(2,1fr);}.g-7{grid-template-columns:repeat(4,1fr);}}

.mod-card{display:flex;flex-direction:column;gap:12px;padding:18px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow);cursor:pointer;transition:transform .12s, box-shadow .12s;}
.mod-card:hover{transform:translateY(-2px);box-shadow:0 14px 28px -14px rgba(20,27,45,.22);}
.mod-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.mod-title{font-size:13.5px;font-weight:700;}

.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px;}
thead th{background:var(--navy-900);color:#fff;text-align:left;padding:11px 14px;font-size:11.3px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--bg);}
.row-click{cursor:pointer;}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;}
.cell-ent{display:flex;align-items:center;gap:10px;}
.cell-ent .meta{display:flex;flex-direction:column;}
.cell-ent .meta b{font-size:13px;font-weight:600;}
.cell-ent .meta span{font-size:11.5px;color:var(--text-faint);}
.table-toolbar{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.table-toolbar .grow{flex:1;}
.search-input{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:8px;padding:7px 10px;background:var(--bg);min-width:190px;}
.search-input input{border:none;background:none;outline:none;font-size:12.8px;width:100%;color:var(--text);font-family:inherit;}
.search-input .icon{width:14px;height:14px;color:var(--text-faint);}
.select-filter{border:1px solid var(--border);border-radius:8px;padding:7px 10px;background:var(--card);font-size:12.6px;color:var(--text-soft);font-family:inherit;}
.pager{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;font-size:12px;color:var(--text-faint);flex-wrap:wrap;gap:8px;}
.pager .pgbtn{display:flex;gap:6px;}
.pager button{border:1px solid var(--border);background:var(--card);border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text-soft);}

.avatar{width:36px;height:36px;border-radius:10px;background:var(--blue-100);color:var(--blue-600);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12.5px;flex:none;}
.avatar.round{border-radius:50%;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.3px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;}
.b-green{color:var(--green);background:var(--green-bg);}
.b-amber{color:var(--amber);background:var(--amber-bg);}
.b-red{color:var(--red);background:var(--red-bg);}
.b-blue{color:var(--blue-600);background:var(--blue-50);}
.b-purple{color:var(--purple);background:var(--purple-bg);}
.b-teal{color:var(--teal);background:var(--teal-bg);}
.b-gray{color:var(--text-soft);background:var(--bg);}
.chip{display:inline-flex;align-items:center;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;background:var(--bg);color:var(--text-soft);border:1px solid var(--border);}

.tabbar{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto;}
.tabbtn{padding:10px 4px;margin-right:22px;font-size:13px;font-weight:600;color:var(--text-faint);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;}
.tabbtn.active{color:var(--blue-600);border-color:var(--blue-600);}
.tabpanel{display:none;}
.tabpanel.active{display:block;}

.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media (max-width:1000px){.form-grid{grid-template-columns:repeat(2,1fr);}}
.field{display:flex;flex-direction:column;gap:6px;}
.field.full{grid-column:1/-1;}
.field.c2{grid-column:span 2;}
.field label{font-size:12px;font-weight:600;color:var(--text-soft);}
.field input,.field select,.field textarea{border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;background:var(--card);color:var(--text);outline:none;font-family:inherit;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue-600);box-shadow:0 0 0 3px var(--blue-50);}
.field .hint{font-size:11px;color:var(--text-faint);}

.acc{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.acc-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--card);cursor:pointer;font-size:13.3px;font-weight:700;}
.acc-head .icon{width:15px;height:15px;color:var(--text-faint);transition:transform .15s;}
.acc.open .acc-head .icon{transform:rotate(180deg);}
.acc-body{display:none;padding:4px 18px 16px;}
.acc.open .acc-body{display:block;}
.kv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px 22px;}
@media (max-width:1000px){.kv-grid{grid-template-columns:repeat(2,1fr);}}
.kv{display:flex;flex-direction:column;gap:2px;}
.kv label{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.03em;}
.kv b{font-size:13.3px;font-weight:600;}

.stepper{display:flex;flex-direction:column;}
.step{display:flex;gap:14px;position:relative;padding-bottom:22px;}
.step:last-child{padding-bottom:0;}
.step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;font-size:13px;font-weight:700;z-index:1;}
.step-line{position:absolute;left:14.5px;top:30px;bottom:0;width:2px;background:var(--border);}
.step.done .step-dot{background:var(--green);color:#fff;}
.step.done .step-line{background:var(--green);}
.step.active .step-dot{background:var(--blue-600);color:#fff;box-shadow:0 0 0 4px var(--blue-50);}
.step.pending .step-dot{background:var(--bg);color:var(--text-faint);border:1.5px dashed var(--border);}
.step-body b{display:block;font-size:13px;font-weight:700;}
.step-body span{font-size:12px;color:var(--text-faint);}

.activity{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--border);}
.activity:last-child{border-bottom:none;}
.activity .a-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:none;}
.activity .a-icon .icon{width:14px;height:14px;}
.activity b{font-size:12.7px;font-weight:600;}
.activity span{font-size:11.5px;color:var(--text-faint);}
.comment{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.comment:last-child{border-bottom:none;}
.comment .c-body{flex:1;background:var(--bg);border-radius:10px;padding:9px 12px;}
.comment b{font-size:12.5px;}
.comment span{font-size:11px;color:var(--text-faint);}
.comment p{margin:4px 0 0;font-size:12.6px;}
.attach-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:9px;margin-bottom:8px;}
.attach-row .a-ico{width:32px;height:32px;border-radius:8px;background:var(--blue-50);color:var(--blue-600);display:flex;align-items:center;justify-content:center;flex:none;}
.attach-row b{font-size:12.6px;display:block;}
.attach-row span{font-size:11px;color:var(--text-faint);}

.bars{display:flex;align-items:flex-end;gap:10px;height:150px;padding-top:10px;}
.bars .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;}
.bars .bar{width:100%;max-width:30px;border-radius:6px 6px 3px 3px;background:var(--blue-600);position:relative;}
.bars .bar.alt{background:var(--blue-100);}
.bars .lbl{font-size:11px;color:var(--text-faint);}
.progress{height:7px;border-radius:20px;background:var(--bg);overflow:hidden;}
.progress > span{display:block;height:100%;border-radius:20px;background:var(--blue-600);}
.progress > span.warn{background:var(--amber);}
.progress > span.bad{background:var(--red);}
.legend-row{display:flex;align-items:center;gap:8px;font-size:12.3px;}
.legend-row .sw{width:9px;height:9px;border-radius:3px;flex:none;}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.perm-pill{display:inline-flex;align-items:center;justify-content:center;width:26px;height:22px;border-radius:6px;font-size:11px;font-weight:800;}

.hstack{display:flex;align-items:center;gap:10px;}
.muted{color:var(--text-faint);}
.mt-0{margin-top:0;}
.section-title{font-size:15px;font-weight:700;margin:26px 0 12px;}
.section-title:first-child{margin-top:0;}
.two-col{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;}
@media (max-width:1100px){.two-col{grid-template-columns:1fr;}}
.empty{padding:40px 20px;text-align:center;color:var(--text-faint);font-size:13px;}

/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.cal-day{border:1px solid var(--border);border-radius:10px;padding:8px;min-height:92px;background:var(--card);}
.cal-day .dnum{font-size:11.5px;font-weight:700;color:var(--text-faint);margin-bottom:6px;}
.cal-day.today{border-color:var(--blue-600);box-shadow:0 0 0 2px var(--blue-50);}
.cal-evt{font-size:10.8px;padding:3px 6px;border-radius:6px;margin-bottom:3px;background:var(--blue-50);color:var(--blue-600);font-weight:600;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-evt.warn{background:var(--amber-bg);color:var(--amber);}
.cal-evt.crit{background:var(--red-bg);color:var(--red);}
.cal-dow{font-size:11px;font-weight:700;color:var(--text-faint);text-align:center;text-transform:uppercase;letter-spacing:.04em;padding-bottom:4px;}

.modal-overlay{position:fixed;inset:0;background:rgba(12,16,26,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;}
.modal-overlay.hidden{display:none;}
.modal-box{background:var(--card);border-radius:14px;max-width:800px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 30px 70px -20px rgba(0,0,0,.4);}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);}
.modal-head h3{margin:0;font-size:15px;font-weight:700;}
.modal-body{padding:20px 22px;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 22px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--card);}

.drawer-overlay{position:fixed;inset:0;background:rgba(12,16,26,.4);z-index:210;display:flex;justify-content:flex-end;}
.drawer-overlay.hidden{display:none;}
.drawer-box{background:var(--card);width:540px;max-width:92vw;height:100vh;overflow-y:auto;box-shadow:-20px 0 50px -20px rgba(0,0,0,.35);animation:slideIn .18s ease;}
@keyframes slideIn{from{transform:translateX(24px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.drawer-head{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:2;}
.drawer-head h3{margin:0 0 3px;font-size:16px;font-weight:700;}
.drawer-head span{font-size:12px;color:var(--text-faint);}
.drawer-body{padding:18px 22px 60px;}
.drawer-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 22px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--card);}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar" id="topbar"></div>
    <div id="view-root"></div>
  </div>
</div>
<div class="modal-overlay hidden" id="modal-root" onclick="if(event.target===this)closeModal();"></div>
<div class="drawer-overlay hidden" id="drawer-root" onclick="if(event.target===this)closeDrawer();"></div>
<script>
/* ============================= ICONS ============================= */
const ICONS = {

const TABLE_REG = {};
function tableHtmlObjs(headers, rowObjs, opts){
  opts=opts||{};
  if(!rowObjs.length) return '<div class="empty">No records match your search or filters.</div>';
  let thead='<thead><tr><th style="width:34px;"><input type="checkbox" onclick="event.stopPropagation()"/></th>'+headers.map(function(h,i){return '<th'+(opts.numCols&&opts.numCols.indexOf(i)>-1?' class="num"':'')+'>'+h+'</th>';}).join('')+'<th></th></tr></thead>';
  let tbody='<tbody>'+rowObjs.map(function(r){
    return '<tr'+(r.onclick?' class="row-click" onclick="'+r.onclick+'"':'')+'><td><input type="checkbox" onclick="event.stopPropagation()"/></td>'+r.cells.map(function(c,i){return '<td'+(opts.numCols&&opts.numCols.indexOf(i)>-1?' class="num"':'')+'>'+c+'</td>';}).join('')+
      '<td><button class="icon-btn" style="width:30px;height:30px;" onclick="event.stopPropagation();'+(r.onclick||'')+'">'+ic('eye')+'</button></td></tr>';
  }).join('')+'</tbody>';
  return '<table>'+thead+tbody+'</table>';
}
function buildRows(id, data){ const reg=TABLE_REG[id]; return data.map(function(d){ return reg.rowFn(d); }); }
function registerTable(id, headers, data, rowFn, opts){
  TABLE_REG[id] = {headers:headers, data:data, rowFn:rowFn, opts:opts||{}};
  return '<div id="tblwrap-'+id+'">'+tableHtmlObjs(headers, buildRows(id,data), opts)+'</div>';
}
function genericFilter(id, q){
  const reg=TABLE_REG[id]; if(!reg) return;
  q=String(q).toLowerCase();
  const filtered=reg.data.filter(function(d){ return JSON.stringify(d).toLowerCase().indexOf(q)>-1; });
  const el=document.getElementById('tblwrap-'+id);
  if(el) el.outerHTML='<div id="tblwrap-'+id+'">'+tableHtmlObjs(reg.headers, filtered.map(function(d){return reg.rowFn(d);}), reg.opts)+'</div>';
}

function showView(id, navId){
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  const target=document.getElementById('view-'+id);
  if(target) target.classList.add('active');
  const active=navId||id;
  document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.toggle('active', n.getAttribute('data-nav')===active); });
  const mainEl=document.querySelector('.main'); if(mainEl) mainEl.scrollTop=0;
}
function initTabs(root){
  (root||document).querySelectorAll('.tabbar').forEach(function(bar){
    bar.querySelectorAll('.tabbtn').forEach(function(btn){
      btn.addEventListener('click', function(){
        const group=bar.closest('.view')||bar.closest('.modal-box')||bar.closest('.drawer-box')||document;
        group.querySelectorAll('.tabbtn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        group.querySelectorAll('.tabpanel').forEach(function(p){ p.classList.toggle('active', p.getAttribute('data-tab')===btn.getAttribute('data-tab')); });
      });
    });
  });
}
function initAccordions(root){
  (root||document).querySelectorAll('.acc-head').forEach(function(h){
    h.addEventListener('click', function(){ h.parentElement.classList.toggle('open'); });
  });
}

/* ============================= VIEW: PLANNING CALENDAR ============================= */
function viewPlanCal(){
  let html = pageHeader('Planning Calendar', 'Consolidated calendar of MRP runs, schedules, shortages and procurement deadlines for '+CURRENT_COMPANY+'.', '<button class="btn btn-secondary">'+ic('refresh')+'Refresh</button>');
  // Build a simple July 2026 month grid (July 1 2026 is a Wednesday)
  const dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html2 = '<div class="grid g-7" style="margin-bottom:6px;">'+dow.map(function(d){return '<div class="cal-dow">'+d+'</div>';}).join('')+'</div>';
  html2 += '<div class="grid g-7">';
  const leadBlank = 3; // Jul 1 2026 = Wednesday -> 3 blanks (Sun,Mon,Tue)
  for(let i=0;i<leadBlank;i++) html2 += '<div></div>';
  for(let day=1; day<=31; day++){
    const dateStr = '2026-07-'+String(day).padStart(2,'0');
    const evts = PLANNING_CALENDAR_EVENTS.filter(function(e){return e.date===dateStr;});
    html2 += '<div class="cal-day'+(day===15?' today':'')+'"><div class="dnum">'+day+'</div>'+
      evts.map(function(e){
        const cls = e.type==='Shortage'?'crit':(e.type==='Capacity'?'warn':'');
        return '<div class="cal-evt '+cls+'" onclick="toast(&quot;'+e.event.replace(/'/g,"\\'").replace(/"/g,'&quot;')+'&quot;)">'+e.event+'</div>';
      }).join('') + '</div>';
  }
  html2 += '</div>';
  html += '<div class="card card-pad">'+html2+'</div>';
  html += '<div class="section-title">Upcoming Events List</div><div class="table-wrap">'+
    tableHtml(['Date','Event','Type'], PLANNING_CALENDAR_EVENTS.map(function(e){return [e.date, e.event, chip(e.type)];})) + '</div>';
  return html;
}

/* ============================= VIEW: PLANNING REPORTS ============================= */
function viewReports(){
  let html = pageHeader('Planning Reports', 'Demand vs supply, material shortage, capacity utilization and procurement plan reports for '+CURRENT_COMPANY+'.', '<button class="btn btn-secondary">'+ic('download')+'Export All</button>');
  html += tabbar([
    {id:'rp-ds', label:'Demand vs Supply'}, {id:'rp-short', label:'Material Shortage'}, {id:'rp-cap', label:'Capacity Utilization'}, {id:'rp-proc', label:'Procurement Plan'}
  ], 'rp') + '</div>';

  html += '<div class="tabpanel active" data-tab="rp-ds"><div class="table-wrap">'+
    tableHtml(['Item','Period','Demand Forecast','MPS Supply Qty','Variance'], MPS_PLANS.map(function(m){
      const v = m.mpsQty-m.demandForecast;
      return [m.name, m.period, m.demandForecast, m.mpsQty, (v>=0? '<span style="color:var(--green);font-weight:700;">+'+v+'</span>' : '<span style="color:var(--red);font-weight:700;">'+v+'</span>')];
    }), {numCols:[2,3,4]}) + '</div></div>';

  html += '<div class="tabpanel" data-tab="rp-short"><div class="table-wrap">'+
    tableHtml(['Item','Required','Available','Shortfall','Needed By','Status'], MATERIAL_SHORTAGE.map(function(m){
      return [m.name, fmtNum(m.required), fmtNum(m.available), fmtNum(m.shortfall), m.neededBy, badgeFor(m.status)];
    }), {numCols:[1,2,3]}) + '</div></div>';

  html += '<div class="tabpanel" data-tab="rp-cap"><div class="table-wrap">'+
    tableHtml(['Work Center','Available Hrs/Week','Planned Hrs/Week','Utilization %','Status'], WORK_CENTER_CAPACITY.map(function(w){
      const pct = Math.round(w.plannedHrsWeek/w.availableHrsWeek*100);
      return [w.workCenter, w.availableHrsWeek, w.plannedHrsWeek, pct+'%', badgeFor(w.status)];
    }), {numCols:[1,2]}) + '</div></div>';

  html += '<div class="tabpanel" data-tab="rp-proc"><div class="table-wrap">'+
    tableHtml(['Item','Suggested Qty','Vendor','Est. Cost','Required By','Status'], PURCHASE_SUGGESTIONS.map(function(s){
      return [s.name, fmtNum(s.qty), s.vendor, fmtINR(s.estCost), s.requiredBy, badgeFor(s.status)];
    }), {numCols:[1,3]}) + '</div></div>';
  return html;
}
/* ============================= VIEW: ADMINISTRATION ============================= */
function viewAdmin(){
  let html = pageHeader('Administration', 'Roles & permissions, audit logs and company/plant configuration.', '');
  html += tabbar([
    {id:'ad-rbac', label:'Roles & Permissions'}, {id:'ad-audit', label:'Audit Logs'}, {id:'ad-org', label:'Company & Plants'}
  ], 'ad') + '</div>';

  html += '<div class="tabpanel active" data-tab="ad-rbac"><div class="hstack" style="margin-bottom:12px;"><span class="muted" style="font-size:12px;">Access levels: N = No Access &middot; V = View Only &middot; E = Edit / Manage &middot; A = Full Admin</span>'+
    '<button class="btn btn-secondary btn-sm" style="margin-left:auto;">'+ic('plus')+'Custom Role</button></div>'+
    '<div class="table-wrap"><table><thead><tr><th>Role</th>'+RBAC_COLS.map(function(c){return '<th>'+c+'</th>';}).join('')+'</tr></thead><tbody>'+
    RBAC_MATRIX.map(function(r){ return '<tr><td><b>'+r.role+'</b></td>'+r.vals.map(function(v){return '<td><span class="perm-pill" style="background:'+({A:'var(--green-bg)',E:'var(--blue-50)',V:'var(--amber-bg)',N:'var(--bg)'}[v])+';color:'+({A:'var(--green)',E:'var(--blue-600)',V:'var(--amber)',N:'var(--text-faint)'}[v])+';">'+v+'</span></td>';}).join('')+'</tr>'; }).join('')+
    '</tbody></table></div></div>';

  html += '<div class="tabpanel" data-tab="ad-audit"><div class="table-wrap">'+
    toolbar('audit','Search audit logs…', [['All Modules','Demand Forecasting','MRP','MPS','Capacity Planning','Procurement Planning','Production Scheduling','Exception Management']])+
    registerTable('audit', ['Timestamp','Actor','Action','Entity','Module','IP Address'], AUDIT_LOGS, function(a){
      return {cells:[a.ts, a.actor, a.action, a.entity, chip(a.module), a.ip], onclick:"toast('Audit entry — "+a.action+"')"};
    }) + '</div></div>';

  html += '<div class="tabpanel" data-tab="ad-org"><div class="grid g-2">'+
    '<div class="card card-pad"><h3 class="mt-0" style="margin-bottom:14px;">Companies</h3>'+tableHtml(['Company','Base Currency'], COMPANIES.map(function(c,i){return [c, i===0?'INR':(i===1?'USD':'AED')];}))+'</div>'+
    '<div class="card card-pad"><h3 class="mt-0" style="margin-bottom:14px;">Plants</h3>'+tableHtml(['Plant'], PLANTS.map(function(p){return [p];}))+'</div>'+
    '</div></div>';
  return html;
}

/* ============================= INIT ============================= */
const VIEW_RENDERERS = {
  workspace: viewWorkspace, demand: viewDemand, mrp: viewMRP, mps: viewMPS, capacity: viewCapacity,
  procurement: viewProcurement, scheduling: viewScheduling, plancal: viewPlanCal, exceptions: viewExceptions,
  reports: viewReports, admin: viewAdmin
};
function renderAllViews(){
  let html = '';
  Object.keys(VIEW_RENDERERS).forEach(function(id){
    html += '<section class="view" id="view-'+id+'"><div class="page">'+VIEW_RENDERERS[id]()+'</div></section>';
  });
  document.getElementById('view-root').innerHTML = html;
  initTabs(document); initAccordions(document);
}
function initApp(){
  renderSidebar();
  renderTopbar();
  renderAllViews();
  showView('workspace');
}
document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
